services:
  radarr:
    image: ghcr.io/hotio/radarr
    container_name: radarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/radarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "homepage.group=Arr"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=http://radarr.${DOMAIN}/"
      - "homepage.description=Movies downloader and manager"
      - "homepage.weight=2"
      - "homepage.widget.type=radarr"
      - "homepage.widget.url=http://radarr:7878"
      - "homepage.widget.key={{HOMEPAGE_FILE_RADARR_KEY}}"
    healthcheck:
      test: curl -f http://localhost:7878/ping
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
      bittorrent:
        condition: service_healthy
        restart: true
  sonarr:
    image: ghcr.io/hotio/sonarr
    container_name: sonarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/sonarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "homepage.group=Arr"
      - "homepage.name=Sonarr"
      - "homepage.icon=sonarr.png"
      - "homepage.href=http://sonarr.${DOMAIN}/"
      - "homepage.description=TV shows downloader and manager"
      - "homepage.weight=1"
      - "homepage.widget.type=sonarr"
      - "homepage.widget.url=http://sonarr:8989"
      - "homepage.widget.key={{HOMEPAGE_FILE_SONARR_KEY}}"
    healthcheck:
      test: curl -f http://localhost:8989/ping
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
      bittorrent:
        condition: service_healthy
        restart: true
  bazarr:
    image: ghcr.io/hotio/bazarr
    container_name: bazarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/bazarr:/config
      - ${ROOT_DIR}/data/media:/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "homepage.group=Arr"
      - "homepage.name=Bazarr"
      - "homepage.icon=bazarr.png"
      - "homepage.href=http://bazarr.${DOMAIN}/"
      - "homepage.description=Subtitles downloader and manager"
      - "homepage.weight=5"
      - "homepage.widget.type=bazarr"
      - "homepage.widget.url=http://bazarr:6767"
      - "homepage.widget.key={{HOMEPAGE_FILE_BAZARR_KEY}}"
    healthcheck:
      test: curl -f http://localhost:6767/ping
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/flaresolverr:/config
    healthcheck:
      test: 'curl -fsS http://localhost:8191/health | grep -qi "\"status\": \"ok\""'
  prowlarr:
    image: ghcr.io/hotio/prowlarr
    container_name: prowlarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/prowlarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "homepage.group=Arr"
      - "homepage.name=Prowlarr"
      - "homepage.icon=prowlarr.png"
      - "homepage.href=http://prowlarr.${DOMAIN}/"
      - "homepage.description=Usenet/Bittorrent indexer manager and searcher"
      - "homepage.weight=3"
      - "homepage.widget.type=prowlarr"
      - "homepage.widget.url=http://prowlarr:9696"
      - "homepage.widget.key={{HOMEPAGE_FILE_PROWLARR_KEY}}"
    healthcheck:
      test: curl -f http://localhost:9696/ping
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
      sonarr:
        condition: service_healthy
        restart: true
      radarr:
        condition: service_healthy
        restart: true
      flaresolverr:
        condition: service_healthy
        restart: true
      bittorrent:
        condition: service_healthy
        restart: true
  clonarr:
    image: ghcr.io/prophetse7en/clonarr
    container_name: clonarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/clonarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clonarr.rule=Host(`clonarr.${DOMAIN}`)"
      - "traefik.http.routers.clonarr.entrypoints=web"
      - "traefik.http.services.clonarr.loadbalancer.server.port=6060"
      - "homepage.group=Arr"
      - "homepage.name=Clonarr"
      - "homepage.icon=/icons/clonarr.png"
      - "homepage.href=http://clonarr.${DOMAIN}/"
      - "homepage.description=A fully visual TRaSH Guides sync tool for Radarr and Sonarr"
      - "homepage.weight=6"
      - "homepage.showStats=true"
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
      sonarr:
        condition: service_healthy
        restart: true
      radarr:
        condition: service_healthy
        restart: true
