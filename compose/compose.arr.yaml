services:
  radarr:
    image: ghcr.io/hotio/radarr
    container_name: radarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/radarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    healthcheck:
      test: curl -f http://localhost:7878/ping || exit 1
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
  sonarr:
    image: ghcr.io/hotio/sonarr
    container_name: sonarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/sonarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
  bazarr:
    image: ghcr.io/hotio/bazarr
    container_name: bazarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/bazarr:/config
      - ${ROOT_DIR}/data/media:/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    healthcheck:
      test: curl -f http://localhost:6767/ping || exit 1
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
  byparr:
    image: ghcr.io/thephaseless/byparr
    container_name: byparr
    restart: unless-stopped
    init: true
    env_file:
      - ${ROOT_DIR}/env/shared.env
    healthcheck:
      test: curl -f http://localhost:8191/health || exit 1
      interval: 10m
      timeout: 30s
      retries: 3
      start_period: 30s
      start_interval: 15s
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/flaresolverr:/config
    healthcheck:
      test: 'curl -fsS http://localhost:8191/health | grep -qi "\"status\": \"ok\""'
      interval: 10m
      timeout: 30s
      retries: 3
      start_period: 30s
      start_interval: 15s
  prowlarr:
    image: ghcr.io/hotio/prowlarr
    container_name: prowlarr
    restart: unless-stopped
    env_file:
      - ${ROOT_DIR}/env/shared.env
    volumes:
      - ${ROOT_DIR}/config/prowlarr:/config
      - ${ROOT_DIR}/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    healthcheck:
      test: curl -f http://localhost:9696/ping || exit 1
    depends_on:
      traefik:
        condition: service_healthy
        restart: true
      sonarr:
        condition: service_healthy
        restart: true
      radarr:
        condition: service_healthy
        restart: true
      byparr:
        condition: service_healthy
        restart: true
      flaresolverr:
        condition: service_healthy
        restart: true
